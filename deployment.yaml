apiVersion: apps/v1
kind: Deployment
metadata:
  name:simple-java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-java-app
  template:
    metadata:
      labels:
        app: simple-java-app
    spec:
      containers:
      - name: simple-java-app
      image: suryar07/java-test-app:latest
---
apiVersion: v1
kind: Service
metadata:
  name:java-service
spec:
  type: NodePort
  selector:
    app: simple-java-app
  ports:
    - port: 80
    targetPort: 8081
    nodePort: 30008